<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Falcon's Snow Cones | Contact Us</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    background: linear-gradient(135deg,#6aa0e0,#4f83c2);
}

.navbar{
    background:#ffffff;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    background:#1e6fa8;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
}

.nav-links a{
    margin-left:20px;
    text-decoration:none;
    color:#1e6fa8;
    font-weight:bold;
}

.contact-btn{
    background:#1e6fa8;
    color:white;
    padding:10px 18px;
    border-radius:8px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px 20px;
}

.contact-box{
    background:#3f6696;
    color:white;
    padding:40px;
    border-radius:15px;
    width:600px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.contact-box h1{
    text-align:center;
    margin-bottom:10px;
}

.contact-info{
    text-align:center;
    margin-bottom:30px;
    font-size:16px;
}

form{
    display:flex;
    flex-direction:column;
}

label{
    margin-top:10px;
}

input, select, textarea{
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:6px;
}

textarea{
    resize:none;
    height:100px;
}

button{
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#f44336;
    color:white;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#d8342a;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">FALCON'S SNOW CONES</div>

<div class="nav-links">
<a href="menu.html">Menu</a>
<a href="calender.html"> Calendar</a>
<a href="contact.html" class="contact-btn" style="color: white;">Contact Us</a>
</div>
</div>

<div class="container">

<div class="contact-box">

<h1>Contact Us</h1>

<div class="contact-info">
<p>Email: FalconsSnowCones@gmail.com</p>
<p>Phone: (555) 814-9623</p>
<p>Have questions, feedback, or want us at your event? Send us a message!</p>
</div>

<form>

<label for="category">Contact Category</label>
<select id="category" required>
<option value="">Select One</option>
<option>Complaint</option>
<option>Request for Service</option>
<option>Positive Review</option>
</select>

<label for="name">Name</label>
<input type="text" id="name" placeholder="Your Name" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" placeholder="Your Phone Number" required>

<label for="email">Email</label>
<input type="email" id="email" placeholder="Your Email" required>

<label for="message">Message</label>
<textarea id="message" placeholder="Tell us what's on your mind..." required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

</body>
</html>
